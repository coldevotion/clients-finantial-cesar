services:
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - api_uploads:/app/uploads
    networks:
      - coolify

networks:
  coolify:
    external: true
    name: coolify

volumes:
  api_uploads:
