version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCCIÓN — Docker Compose para Coolify
#
# Servicios de infraestructura: Postgres, Redis, Kafka, ClickHouse
# Apps: api, worker, web
#
# En Coolify:
#   1. Crear nuevo "Docker Compose" resource apuntando a este archivo
#   2. Agregar todas las variables de entorno en la sección de Coolify
#   3. Los servicios de DB (postgres, redis, clickhouse) también se pueden
#      crear como recursos nativos de Coolify y referenciar por hostname
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── INFRAESTRUCTURA ──────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wa_campaigns
      POSTGRES_USER: ${POSTGRES_USER:-wauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-wauser}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:29092']
      interval: 15s
      timeout: 10s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: wa_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8123/ping']
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── APLICACIONES ─────────────────────────────────────────────────────────

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-wauser}:${POSTGRES_PASSWORD}@postgres:5432/wa_campaigns
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      KAFKA_BROKERS: kafka:29092
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: wa_analytics
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-WA Campaigns}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      BIRD_WEBHOOK_SECRET: ${BIRD_WEBHOOK_SECRET}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-wauser}:${POSTGRES_PASSWORD}@postgres:5432/wa_campaigns
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: wa-worker-group
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    deploy:
      replicas: 2   # 2 workers para mayor throughput

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_WS_URL: ${WS_URL}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  clickhouse_data:
